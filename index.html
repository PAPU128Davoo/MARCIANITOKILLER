<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galactic Defender: Secure Access</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #444; display: none; } /* Oculto hasta login */
        canvas { display: block; background: #050505; }
        .ui { position: absolute; top: -45px; width: 100%; display: flex; justify-content: space-between; font-size: 0.9rem; color: #00ff88; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; z-index: 10; }

        /* Pantalla de Bloqueo Estilo Portal */
        #lock-screen {
            background: #1c2128;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #00ff88;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }
        input { padding: 12px; border-radius: 5px; border: none; width: 80%; margin-bottom: 15px; text-align: center; outline: none; background: #0d1117; color: white; border: 1px solid #30363d; }

        .level-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            margin: 15px 0; max-height: 250px; overflow-y: auto; padding: 10px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
        }
        .level-btn { width: 55px; height: 55px; background: #222; border: 2px solid #555; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; transition: 0.2s; }
        .level-btn.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .stars { color: #f1c40f; font-size: 0.6rem; }

        .shop { border: 2px solid #00ff88; padding: 15px; margin-top: 10px; border-radius: 10px; width: 90%; background: rgba(0,255,136,0.05); }
        .mutator-btn { background: #004400; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 5px; }
        .mutator-btn.active { background: #00ff88; color: #000; box-shadow: 0 0 15px #00ff88; }
        .mutator-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn { padding: 12px 25px; background: #00ff88; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #0d1117; }
        button.main-btn { background: #00ff88; color: #000; border: none; padding: 12px 25px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="lock-screen">
    <h2 style="color: #00ff88; margin-top: 0;">🔐 ACCESO RESTRINGIDO</h2>
    <p style="font-size: 0.8rem; color: #c9d1d9;">Introduce el código de seguridad para jugar.</p>
    <input type="password" id="pass-input" placeholder="Código VIP">
    <br>
    <button class="btn" onclick="checkPass()">DESBLOQUEAR JUEGO</button>
</div>

<!-- CONTENEDOR DEL JUEGO -->
<div id="game-container">
    <div class="ui">
        <span>⭐ <span id="total-stars">0</span></span>
        <span>LEVEL <span id="lvl-display">1</span></span>
        <span>SCORE <span id="score">0</span></span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h1 id="ov-title" style="color:#00ff88; margin:0;">GALACTIC DEFENDER</h1>

        <div id="level-menu" style="display:none; width: 100%;">
            <p style="margin:5px 0; font-size: 0.8rem;">ESTADO DE LA MISIÓN (50 NIVELES)</p>
            <div class="level-grid" id="grid"></div>

            <div class="shop">
                <button id="double-shot-btn" class="mutator-btn" onclick="buyDoubleShot()">
                    DOBLE DISPARO (10 ⭐)
                </button>
            </div>
        </div>

        <div id="result-screen" style="display:none">
            <div id="star-display" style="color:#f1c40f; font-size: 2.5rem; margin:10px 0;"></div>
            <p id="ov-msg"></p>
            <button class="main-btn" onclick="showMenu()">CONTINUAR</button>
        </div>

        <button id="start-btn" class="main-btn" onclick="showMenu()">EMPEZAR</button>
    </div>
</div>

<script>
    // --- LÓGICA DE ACCESO ---
    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if (input === "pc2024") {
            localStorage.setItem('invaders_auth', 'true');
            initGame();
        } else {
            alert("Código incorrecto. Acceso denegado.");
        }
    }

    document.getElementById('pass-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { checkPass(); }
    });

    window.onload = function() {
        if (localStorage.getItem('invaders_auth') === 'true') {
            initGame();
        }
    };

    function initGame() {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        showMenu();
    }

    // --- LÓGICA DEL JUEGO ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; canvas.height = 600;

    let gameState = JSON.parse(localStorage.getItem('GalacticDefender_SAVE')) || {
        levels: Array(50).fill(0),
        doubleShot: false
    };

    function saveGame() {
        localStorage.setItem('GalacticDefender_SAVE', JSON.stringify(gameState));
    }

    let player, bullets, aliens, gameActive, score, currentLvl = 1, direction = 1;

    function getTotalStars() { return gameState.levels.reduce((a, b) => a + b, 0); }

    function showMenu() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('level-menu').style.display = 'block';

        const total = getTotalStars();
        document.getElementById('total-stars').innerText = total;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        gameState.levels.forEach((stars, i) => {
            const btn = document.createElement('button');
            const isLocked = i > 0 && gameState.levels[i-1] === 0;
            btn.className = 'level-btn' + (isLocked ? ' locked' : '');
            btn.innerHTML = `L${i+1}<div class="stars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`;
            if(!isLocked) btn.onclick = () => startLevel(i + 1);
            grid.appendChild(btn);
        });

        const dsBtn = document.getElementById('double-shot-btn');
        if(gameState.doubleShot) {
            dsBtn.innerText = "MUTATOR: DOBLE DISPARO ACTIVADO";
            dsBtn.className = "mutator-btn active";
        } else {
            dsBtn.disabled = total < 10;
        }
    }

    function buyDoubleShot() {
        if(!gameState.doubleShot && getTotalStars() >= 10) {
            gameState.doubleShot = true;
            saveGame();
            showMenu();
        }
    }

    function startLevel(lvl) {
        currentLvl = lvl;
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('lvl-display').innerText = lvl;
        player = { x: canvas.width/2 - 25, y: canvas.height - 40, w: 50, h: 20, speed: 8 };
        bullets = []; aliens = []; score = 0; direction = 1; gameActive = true;

        const rows = Math.min(3 + Math.floor(lvl/8), 8);
        const cols = Math.min(6 + Math.floor(lvl/12), 10);
        const startX = (canvas.width - (cols * 55)) / 2;

        for(let i=0; i<rows; i++) {
            for(let j=0; j<cols; j++) {
                aliens.push({ x: startX + j*55, y: i*40 + 60, w: 40, h: 22, color: `hsl(${(i*40) + (lvl*10)}, 75%, 55%)` });
            }
        }
        update();
    }

    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if(keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if(keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

        const maxBullets = gameState.doubleShot ? 12 : 6;
        if(keys['Space'] && bullets.length < maxBullets) {
            if(gameState.doubleShot) {
                bullets.push({ x: player.x + 5, y: player.y - 10, w: 4, h: 15, c: '#0f0' });
                bullets.push({ x: player.x + player.w - 9, y: player.y - 10, w: 4, h: 15, c: '#0f0' });
            } else {
                bullets.push({ x: player.x + player.w/2 - 2, y: player.y - 10, w: 4, h: 15, c: '#fff' });
            }
            keys['Space'] = false;
        }

        ctx.fillStyle = '#fff';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillRect(player.x + 20, player.y - 8, 10, 8);

        bullets.forEach((b, i) => {
            b.y -= 12;
            ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, b.w, b.h);
            if(b.y < -20) bullets.splice(i,1);
        });

        let hitEdge = false;
        let lowestY = 0;
        aliens.forEach((a, ai) => {
            a.x += direction * (1.3 + (currentLvl * 0.08));
            ctx.fillStyle = a.color; ctx.fillRect(a.x, a.y, a.w, a.h);
            if(a.x + a.w > canvas.width - 5 || a.x < 5) hitEdge = true;
            if(a.y > lowestY) lowestY = a.y;
            bullets.forEach((b, bi) => {
                if(b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h) {
                    aliens.splice(ai, 1); bullets.splice(bi, 1); score += 50;
                }
            });
            if(a.y + a.h > player.y) endLevel(false);
        });

        if(hitEdge) { direction *= -1; aliens.forEach(a => a.y += 18); }
        if(aliens.length === 0) endLevel(true, lowestY);
        if(gameActive) requestAnimationFrame(update);
    }

    function endLevel(win, lastY) {
        gameActive = false;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('level-menu').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        if(win) {
            const dist = player.y - lastY;
            let stars = 1;
            if(dist > 320) stars = 3; else if(dist > 180) stars = 2;
            if(stars > gameState.levels[currentLvl-1]) { gameState.levels[currentLvl-1] = stars; saveGame(); }
            document.getElementById('ov-title').innerText = "¡NIVEL COMPLETADO!";
            document.getElementById('star-display').innerText = '★'.repeat(stars) + '☆'.repeat(3-stars);
            document.getElementById('ov-msg').innerText = `MISIÓN CUMPLIDA EN NIVEL ${currentLvl}`;
        } else {
            document.getElementById('ov-title').innerText = "GAME OVER";
            document.getElementById('star-display').innerText = "";
            document.getElementById('ov-msg').innerText = "La base ha sido destruida.";
        }
    }
</script>
</body>
</html>
